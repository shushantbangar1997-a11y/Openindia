kind = "web"
previewPath = "/"
title = "Rapid X AI"
version = "1.0.0"
id = "artifacts/rapid-x"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23045

[services.development]
run = "pnpm --filter @workspace/rapid-x run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rapid-x", "run", "build" ]
publicDir = "artifacts/rapid-x/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23045"
BASE_PATH = "/"
